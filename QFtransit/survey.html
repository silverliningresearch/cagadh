  <body>
    <survalyzer-survey
      surveyhash="xxxqxgvvma"
      tenant="silverlining"
    ></survalyzer-survey>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://survalyzer.survalyzer.eu/assets/survalyzer-survey.js"></script>

    <script src="data/city_list.js"></script>
    <script src="data/country_list.js"></script>
    
    <script src="scripts/city_search.js"></script>

    <script>
        window.addEventListener('load', function () {
        setTimeout(() => {
          const listSearchHandler = () => {
            console.log("Current Page Index: ", api.fn.getCurrentPageIndex() );

            // if (api.fn.getCurrentPageIndex() === 1) {
            //   show_flight_search_box();
            // } else {
            //   hide_flight_search_box();
            // }
            switch (api.fn.getCurrentPageIndex()) {
              case 7:
                show_city_search_box("B1b");
                break;
              case 8:
                show_city_search_box("B2_1"); 
                break;    
              case 10:
                show_city_search_box("B2_3"); 
                break;                              
              case 12:
                show_city_search_box("B2_5"); 
                break;     
              case 16:
                show_city_search_box("B2_9"); 
                break;     
                       
              default:
                hide_city_search_box();
                break;         
            }

          };

          api.events.subscribe('next', listSearchHandler);
          api.events.subscribe('back', listSearchHandler);
          api.events.subscribe('startedOrContinued', listSearchHandler);
        });
      });
    </script>
</body>
